name: Docker Push to ACR

on:
  workflow_call: 
    inputs:
      image-name:
        description: 'The image name to push'
        required: true
      acr-login-server:
        description: 'Azure Container Registry login server (e.g., myregistry.azurecr.io)'
        required: true
      ACR_USERNAME:
        description: 'ACR_Username'
        required: true
      ACR_PASSWORD:
        description: 'ACR_Password'
        required: true
      tag:
        description: 'The tag of image to push'
        required: true

jobs:
  push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Log in to Azure Container Registry
        uses: azure/docker-login@v1
        with:
          login-server: ${{ inputs.acr-login-server }}
          username: ${{ inputs.ACR_USERNAME }}
          password: ${{ inputs.ACR_PASSWORD }}

      - name: Push Docker image to ACR
        run: |
          docker tag ${{ inputs.image-name }}:${{input.tag}} ${{ inputs.acr-login-server }}/${{ inputs.image-name }}:${{ input.tag }}
          docker push ${{ inputs.acr-login-server }}/${{ inputs.image-name }}:${{ input.tag }}
