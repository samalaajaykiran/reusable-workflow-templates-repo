name: Docker Build

on:
  workflow_call: # To allow this workflow to be reusable
    inputs:
      dockerfile:
        description: 'Path to Dockerfile'
        required: true
        default: 'Dockerfile'
      context:
        description: 'Context for the Docker build (usually the directory of the Dockerfile)'
        required: true
        default: '.'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Cache Docker layers
        uses: actions/cache@v3
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      - name: Build Docker image
        run: |
          docker build -f ${{ inputs.dockerfile }} -t my-image:latest ${{ inputs.context }}
