name: Docker Push to ACR

on:
  workflow_call:
    inputs:
      image-name:
        description: 'The image name to push'
        required: true
        type: string
      acr-login-server:
        description: 'Azure Container Registry login server'
        required: true
        type: string
      tag:
        description: 'Image tag'
        required: true
        type: string
        
    secrets:
      ACR_USERNAME:
        description: 'ACR Username'
        required: true
      ACR_PASSWORD:
        description: 'ACR Password'
        required: true

jobs:
  push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Log in to Azure Container Registry
        uses: azure/docker-login@v1
        with:
          login-server: ${{ inputs.acr-login-server }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Push Docker image to ACR
        run: |
          docker tag ${{ inputs.image-name }}:${{ inputs.tag }} ${{ inputs.acr-login-server }}/${{ inputs.image-name }}:${{ inputs.tag }}
          docker push ${{ inputs.acr-login-server }}/${{ inputs.image-name }}:${{ inputs.tag }}
